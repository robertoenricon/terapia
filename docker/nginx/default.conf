# ----------------------------------------------------------------------------
# Configuracao do Nginx para servir a aplicacao Laravel via PHP-FPM.
# O Nginx serve os arquivos estaticos e repassa as requisicoes PHP ao
# container "app" (php-fpm) na porta 9000.
# ----------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;

    # Diretorio publico do Laravel (ponto de entrada da aplicacao).
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Tamanho maximo do corpo das requisicoes (uploads).
    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Repassa a execucao dos arquivos PHP para o PHP-FPM.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Tipo MIME correto para o manifesto do PWA.
    location = /manifest.webmanifest { default_type application/manifest+json; }

    # Nao registra erros para favicon e robots ausentes.
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Bloqueia o acesso a arquivos ocultos (ex.: .env, .git).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
