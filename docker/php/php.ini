; ----------------------------------------------------------------------------
; Ajustes de PHP para o ambiente de desenvolvimento do projeto "semear".
; ----------------------------------------------------------------------------

; Exibe erros durante o desenvolvimento.
display_errors = On
error_reporting = E_ALL

; Limites adequados para uploads e processamento de requisicoes.
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120

; Fuso horario padrao da aplicacao.
date.timezone = America/Sao_Paulo

; OPcache: acelera a execucao mantendo o bytecode em memoria.
opcache.enable = 1
opcache.enable_cli = 0
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
