<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Semear">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#34d399"/>
            <stop offset="1" stop-color="#0ea5e9"/>
        </linearGradient>
    </defs>

    <!-- Fundo arredondado com o gradiente da marca -->
