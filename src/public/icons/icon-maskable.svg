<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Semear">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#34d399"/>
            <stop offset="1" stop-color="#0ea5e9"/>
        </linearGradient>
    </defs>

    <!-- Fundo quadrado e opaco: bordas sao recortadas pela mascara do sistema
         (Android maskable / iOS). O conteudo fica na zona segura central. -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Broto reduzido (~72%) para respeitar a zona segura da mascara -->
    <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
        <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M256 408 C256 366 256 326 256 290"/>
        </g>
        <g fill="#ffffff">
            <path d="M256 290 Q221 206 146 182 Q174 264 256 290 Z"/>
            <path d="M256 290 Q291 206 366 182 Q338 264 256 290 Z"/>
        </g>
    </g>
</svg>
