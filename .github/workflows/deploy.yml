# Deploy automático para a LocalWeb (hospedagem compartilhada / cPanel) via FTP.
#
# A cada push na branch "main" (ou disparo manual), o workflow:
#   1. Compila os assets do front-end (Vite).
#   2. Prepara a pasta pública do subdomínio com o index.php ajustado.
#   3. Envia por FTP a aplicação para "terapia_app/" (fora do public_html) e o
#      conteúdo público para "public_html/diario/".
#
# O "vendor/" NÃO é enviado pelo workflow (envie-o manualmente uma vez e a cada
# mudança em composer.lock — a LocalWeb não tem SSH para rodar "composer").
#
# As migrations NÃO rodam aqui — execute-as manualmente quando necessário
# (veja o Passo 3 do README, apontando o .env para a DBaaS).
#
# Segredos necessários (Settings > Secrets and variables > Actions):
#   FTP_SERVER    -> host de FTP da LocalWeb (ex.: ftp.seu-dominio.com.br)
#   FTP_USERNAME  -> usuário de FTP
#   FTP_PASSWORD  -> senha de FTP

name: Deploy LocalWeb (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita dois deploys simultâneos sobrescrevendo arquivos no servidor.
concurrency:
  group: deploy-localweb
  cancel-in-progress: false

jobs:
  deploy:
    name: Build e envio por FTP
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Instalar dependências JS e compilar assets
        working-directory: src
        run: |
          npm ci
          npm run build

      - name: Preparar pasta pública do subdomínio (diario)
        run: |
          rm -rf deploy-diario
          mkdir -p deploy-diario
          cp -r src/public/. deploy-diario/
          # Ajusta os caminhos do index.php: o app está em terapia_app/, dois
          # níveis acima de public_html/diario/.
          sed -i "s#__DIR__\.'/\.\./#__DIR__.'/../../terapia_app/#g" deploy-diario/index.php

      - name: Enviar a aplicação para terapia_app/ (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./src/
          server-dir: ./terapia_app/
          # Itens que NÃO devem ser enviados nem apagados no servidor.
          # (Definir "exclude" substitui os padrões da action, por isso os
          # itens de Git/node_modules são repetidos aqui.)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            .env
            .env.*
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**

      - name: Enviar a pasta pública para public_html/diario/ (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-diario/
          server-dir: ./public_html/diario/
