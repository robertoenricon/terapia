# ----------------------------------------------------------------------------
# Orquestracao dos containers do projeto "terapia".
#
# Servicos:
#   - app    : PHP-FPM 8.3 (executa a aplicacao Laravel)
#   - nginx  : servidor web (porta 8080 no host)
#   - db     : MySQL 8 (porta 3306 no host)
#
# As variaveis abaixo possuem valores padrao, mas podem ser sobrescritas
# criando um arquivo ".env" na raiz (veja ".env.example").
# ----------------------------------------------------------------------------
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: terapia_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    networks:
      - terapia
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: terapia_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - terapia
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: terapia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-terapia}
      MYSQL_USER: ${DB_USERNAME:-terapia}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - terapia
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  terapia:
    driver: bridge

volumes:
  db_data:
    driver: local
