<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f4"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
  </defs>

  <!-- fundo (tema escuro do app) -->
  <rect width="980" height="520" rx="0" fill="#07120f"/>

  <text x="40" y="56" fill="#eafaf4" font-size="30" font-weight="700">Benção 🙏 — 3 sugestões de cor</text>
  <text x="40" y="86" fill="#93b1aa" font-size="16">Tons distintos das categorias existentes (verde, ciano/azul, vermelho, violeta)</text>

  <!-- ====== Card 1: Rosa Lótus ====== -->
  <g transform="translate(40,120)">
    <rect width="280" height="360" rx="20" fill="#0e1f1a" stroke="#1c3a33"/>
    <text x="24" y="44" fill="#eafaf4" font-size="22" font-weight="700">1 · Rosa Lótus</text>
    <text x="24" y="70" fill="#93b1aa" font-size="14">Flor de lótus · devoção · serenidade</text>

    <!-- chip (estado ativo, com gradiente) -->
    <rect x="24" y="92" width="232" height="56" rx="16" fill="url(#g1)"/>
    <text x="48" y="128" font-size="24">🙏</text>
    <text x="86" y="128" fill="#ffffff" font-size="20" font-weight="600">Benção</text>

    <!-- chip (estado inativo, cor sólida no texto) -->
    <rect x="24" y="164" width="232" height="56" rx="16" fill="#0a1714" stroke="#1c3a33"/>
    <text x="48" y="200" font-size="24">🙏</text>
    <text x="86" y="200" fill="#f472b6" font-size="20" font-weight="600">Benção</text>

    <!-- swatches -->
    <rect x="24" y="244" width="50" height="50" rx="12" fill="#f472b6"/>
    <rect x="84" y="244" width="50" height="50" rx="12" fill="#be185d"/>
    <text x="24" y="320" fill="#93b1aa" font-size="13">sólido  #f472b6</text>
    <text x="24" y="342" fill="#93b1aa" font-size="13">escuro  #be185d</text>
  </g>

  <!-- ====== Card 2: Coral Sagrado ====== -->
  <g transform="translate(350,120)">
    <rect width="280" height="360" rx="20" fill="#0e1f1a" stroke="#1c3a33"/>
    <text x="24" y="44" fill="#eafaf4" font-size="22" font-weight="700">2 · Coral Sagrado</text>
    <text x="24" y="70" fill="#93b1aa" font-size="14">Luz de vela · gratidão · acolhimento</text>

    <rect x="24" y="92" width="232" height="56" rx="16" fill="url(#g2)"/>
    <text x="48" y="128" font-size="24">🙏</text>
    <text x="86" y="128" fill="#ffffff" font-size="20" font-weight="600">Benção</text>

    <rect x="24" y="164" width="232" height="56" rx="16" fill="#0a1714" stroke="#1c3a33"/>
    <text x="48" y="200" font-size="24">🙏</text>
    <text x="86" y="200" fill="#fb923c" font-size="20" font-weight="600">Benção</text>

    <rect x="24" y="244" width="50" height="50" rx="12" fill="#fb923c"/>
    <rect x="84" y="244" width="50" height="50" rx="12" fill="#ea580c"/>
    <text x="24" y="320" fill="#93b1aa" font-size="13">sólido  #fb923c</text>
    <text x="24" y="342" fill="#93b1aa" font-size="13">escuro  #ea580c</text>
  </g>

  <!-- ====== Card 3: Marfim Luminoso ====== -->
  <g transform="translate(660,120)">
    <rect width="280" height="360" rx="20" fill="#0e1f1a" stroke="#1c3a33"/>
    <text x="24" y="44" fill="#eafaf4" font-size="22" font-weight="700">3 · Marfim Luminoso</text>
    <text x="24" y="70" fill="#93b1aa" font-size="14">Pureza · luz serena · paz</text>

    <rect x="24" y="92" width="232" height="56" rx="16" fill="url(#g3)"/>
    <text x="48" y="128" font-size="24">🙏</text>
    <text x="86" y="128" fill="#1c1917" font-size="20" font-weight="600">Benção</text>

    <rect x="24" y="164" width="232" height="56" rx="16" fill="#0a1714" stroke="#1c3a33"/>
    <text x="48" y="200" font-size="24">🙏</text>
    <text x="86" y="200" fill="#e7e5e4" font-size="20" font-weight="600">Benção</text>

    <rect x="24" y="244" width="50" height="50" rx="12" fill="#e7e5e4"/>
    <rect x="84" y="244" width="50" height="50" rx="12" fill="#a8a29e"/>
    <text x="24" y="320" fill="#93b1aa" font-size="13">sólido  #e7e5e4</text>
    <text x="24" y="342" fill="#93b1aa" font-size="13">escuro  #a8a29e</text>
  </g>
</svg>
